<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#e5e7eb"/>
  
  <g transform="translate(400, 300)">
    
    <!-- YATRA -->
    <text x="0" y="-30" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="46" 
          font-weight="700" 
          fill="#9ca3af" 
          text-anchor="middle" 
          letter-spacing="8" 
          opacity="0.35">YATRA</text>
    
    <!-- Smile journey design -->
    <g opacity="0.18">
      <!-- Smile curve path touching Y and A bottom - bigger curve -->
      <path d="M-85,0 Q0,80 85,0" stroke="#9ca3af" stroke-width="3" fill="none" stroke-linecap="round"/>
      
      <!-- Start pin at Y bottom -->
      <g transform="translate(-85, 0)">
        <path d="M0,-10 C-4,-10 -6,-7 -6,-3 C-6,1 0,6 0,6 C0,6 6,1 6,-3 C6,-7 4,-10 0,-10 Z" fill="#9ca3af"/>
        <circle cx="0" cy="-3" r="2" fill="#e5e7eb"/>
      </g>
      
      <!-- End pin at A bottom -->
      <g transform="translate(85, 0)">
        <path d="M0,-10 C-4,-10 -6,-7 -6,-3 C-6,1 0,6 0,6 C0,6 6,1 6,-3 C6,-7 4,-10 0,-10 Z" fill="#9ca3af"/>
        <circle cx="0" cy="-3" r="2" fill="#e5e7eb"/>
      </g>
    </g>
    
    <!-- No Image text centered inside the circle - visible -->
    <text x="0" y="5" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="12" 
          fill="#9ca3af" 
          text-anchor="middle" 
          opacity="0.3">No Image</text>
  </g>
</svg>
