name: Yatra CI

on:
  push:
    branches: [ main, develop, 3.0.0 ]
  pull_request:
    branches: [ main, develop, 3.0.0 ]

jobs:
  # Code Quality and Standards Compliance
  quality-check:
    name: Code Quality (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [8.1, 8.2]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, gd, zip, curl, json
          coverage: none
          
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-
            ${{ runner.os }}-composer-
            
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --optimize-autoloader
        
      - name: Validate Composer
        run: composer validate --strict
        
      - name: PHP Lint (Syntax Check)
        id: php-lint
        run: |
          echo "Running PHP syntax check..."
          ERRORS=""
          while IFS= read -r -d '' file; do
            OUTPUT=$(php -l "$file" 2>&1)
            if [ $? -ne 0 ]; then
              ERRORS="${ERRORS}${OUTPUT}\n"
            fi
          done < <(find . -type f -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" -print0)
          
          if [ -n "$ERRORS" ]; then
            echo -e "$ERRORS" > php-lint-errors.txt
            echo -e "$ERRORS"
            echo "has_errors=true" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "No PHP syntax errors found" > php-lint-errors.txt
          echo "has_errors=false" >> $GITHUB_OUTPUT
          
      - name: Run PHP_CodeSniffer (WordPress Standards)
        id: phpcs
        if: always() && steps.php-lint.outcome != 'failure'
        run: |
          echo "Running WordPress coding standards check..."
          vendor/bin/phpcs \
            --standard=phpcs.xml \
            --report=full \
            --report-file=phpcs-report.txt \
            --report-json=phpcs-report.json \
            --report-gitblame=phpcs-gitblame.txt \
            -q || true
          
          # Parse JSON and create readable error report
          if [ -f phpcs-report.json ]; then
            php -r '
              $json = json_decode(file_get_contents("phpcs-report.json"), true);
              $output = "";
              $totalErrors = 0;
              $totalWarnings = 0;
              if (isset($json["files"])) {
                foreach ($json["files"] as $file => $data) {
                  $totalErrors += $data["errors"] ?? 0;
                  $totalWarnings += $data["warnings"] ?? 0;
                  if (isset($data["messages"]) && !empty($data["messages"])) {
                    $output .= "FILE: " . $file . " (Errors: " . ($data["errors"] ?? 0) . ", Warnings: " . ($data["warnings"] ?? 0) . ")\n";
                    foreach ($data["messages"] as $msg) {
                      $type = $msg["type"] === "ERROR" ? "ERROR" : "WARNING";
                      $output .= "  Line " . $msg["line"] . " [" . $type . "]: " . $msg["message"] . " (" . $msg["source"] . ")\n";
                    }
                    $output .= "\n";
                  }
                }
              }
              if ($totalErrors === 0 && $totalWarnings === 0) {
                $output = "✅ No PHPCS errors or warnings found. Code follows WordPress coding standards.\n";
              } else {
                $output .= "TOTAL: " . $totalErrors . " errors, " . $totalWarnings . " warnings\n";
              }
              file_put_contents("phpcs-errors-readable.txt", $output);
              echo $output;
              if ($totalErrors > 0) { exit(1); }
            '
          else
            echo "✅ No PHPCS errors or warnings found. Code follows WordPress coding standards." > phpcs-errors-readable.txt
          fi
                
      - name: Run PHPStan Static Analysis
        id: phpstan
        if: always() && steps.php-lint.outcome != 'failure'
        run: |
          echo "Running PHPStan static analysis..."
          vendor/bin/phpstan analyse \
            --no-progress \
            --error-format=json \
            --memory-limit=1G > phpstan-report.json 2>&1 || true
          
          # Parse JSON and create readable error report
          if [ -f phpstan-report.json ]; then
            php -r '
              $raw = file_get_contents("phpstan-report.json");
              $json = json_decode($raw, true);
              if ($json === null) {
                file_put_contents("phpstan-errors-readable.txt", "PHPStan output (non-JSON):\n" . $raw . "\n");
                echo $raw;
                exit(0);
              }
              $output = "";
              $totalErrors = 0;
              if (isset($json["files"])) {
                foreach ($json["files"] as $file => $data) {
                  if (isset($data["messages"]) && !empty($data["messages"])) {
                    $output .= "FILE: " . $file . "\n";
                    foreach ($data["messages"] as $msg) {
                      $totalErrors++;
                      $output .= "  Line " . $msg["line"] . ": " . $msg["message"] . "\n";
                    }
                    $output .= "\n";
                  }
                }
              }
              $totals = $json["totals"]["errors"] ?? $totalErrors;
              if ($totals === 0) {
                $output = "✅ No PHPStan errors found. Code passes static analysis at level 5.\n";
              } else {
                $output .= "TOTAL ERRORS: " . $totals . "\n";
              }
              file_put_contents("phpstan-errors-readable.txt", $output);
              echo $output;
              if ($totals > 0) { exit(1); }
            '
          else
            echo "✅ No PHPStan errors found. Code passes static analysis at level 5." > phpstan-errors-readable.txt
          fi
          
      - name: Composer Audit (Security Check)
        id: composer-audit
        if: always()
        run: |
          composer audit 2>&1 | tee composer-audit.txt || true
          
      - name: Check for disallowed functions
        id: disallowed
        if: always()
        run: |
          echo "Checking for disallowed functions..."
          FOUND=""
          disallowed_functions=("eval(" "exec(" "shell_exec(" "system(" "passthru(")
          
          for func in "${disallowed_functions[@]}"; do
            MATCHES=$(grep -rn "$func" . --include="*.php" --exclude-dir=vendor --exclude-dir=node_modules 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              FOUND="${FOUND}Disallowed function '${func}' found:\n${MATCHES}\n\n"
            fi
          done
          
          if [ -n "$FOUND" ]; then
            echo -e "$FOUND" | tee disallowed-functions.txt
            exit 1
          fi
          echo "No disallowed functions found" > disallowed-functions.txt

      - name: Upload All Error Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-errors-php${{ matrix.php }}
          path: |
            php-lint-errors.txt
            phpcs-report.txt
            phpcs-report.json
            phpcs-gitblame.txt
            phpcs-errors-readable.txt
            phpstan-report.json
            phpstan-errors-readable.txt
            composer-audit.txt
            disallowed-functions.txt
          if-no-files-found: ignore

  # Security Scanning
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: dom, mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, gd, zip, curl
          
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-security-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-security-
            
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress
        
      - name: Run Composer Security Audit
        id: security-audit
        run: composer audit 2>&1 | tee security-audit.txt || true
        
      - name: Check for hardcoded secrets
        id: secrets-check
        run: |
          echo "Checking for potential secrets..." > secrets-check.txt
          FOUND=$(grep -rn -i "password\s*=\s*['\"][^'\"]\+['\"]" . --include="*.php" --exclude-dir=vendor --exclude-dir=node_modules 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "Potential hardcoded passwords found:" >> secrets-check.txt
            echo "$FOUND" >> secrets-check.txt
            cat secrets-check.txt
            exit 1
          fi
          echo "No obvious secrets found" >> secrets-check.txt

      - name: Upload Security Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-errors
          path: |
            security-audit.txt
            secrets-check.txt
          if-no-files-found: ignore

  # Plugin Structure Validation
  structure-check:
    name: Plugin Structure Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Check plugin structure
        run: |
          ERRORS="" 
          
          if [ ! -f "yatra.php" ]; then
            ERRORS="${ERRORS}Main plugin file yatra.php not found\n"
          fi
          
          required_dirs=("app" "assets" "templates" "includes")
          for dir in "${required_dirs[@]}"; do
            if [ ! -d "$dir" ]; then
              ERRORS="${ERRORS}Required directory $dir not found\n"
            fi
          done
          
          if ! grep -q "Plugin Name:" yatra.php 2>/dev/null; then
            ERRORS="${ERRORS}Plugin header not found in yatra.php\n"
          fi
          
          if [ ! -f "composer.json" ]; then
            ERRORS="${ERRORS}composer.json not found\n"
          fi
          
          executable_files=$(find . -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" -executable 2>/dev/null || true)
          if [ -n "$executable_files" ]; then
            ERRORS="${ERRORS}Executable PHP files found (security risk):\n${executable_files}\n"
          fi
          
          if [ -n "$ERRORS" ]; then
            echo -e "$ERRORS" | tee structure-errors.txt
            exit 1
          fi
          echo "Plugin structure is valid" > structure-errors.txt
          
      - name: Upload Structure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: structure-errors
          path: structure-errors.txt
          if-no-files-found: ignore

  # WordPress Compatibility Check
  wordpress-compatibility:
    name: WordPress Compatibility
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: dom, mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, gd, zip, curl
          
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-wp-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-wp-
            
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress
        
      - name: Check WordPress compatibility
        run: |
          ERRORS=""
          
          # Check for custom function definitions with wp_ prefix
          WP_FUNCS=$(grep -rn "^[[:space:]]*\(public \|private \|protected \|static \)*function wp_" . --include="*.php" --exclude-dir=vendor --exclude-dir=node_modules 2>/dev/null || true)
          if [ -n "$WP_FUNCS" ]; then
            ERRORS="${ERRORS}Custom functions with wp_ prefix found (should use unique prefix):\n${WP_FUNCS}\n\n"
          fi
          
          # Check for proper text domain usage
          TEXT_DOMAIN_ISSUES=$(grep -rn "__(" . --include="*.php" --exclude-dir=vendor --exclude-dir=node_modules 2>/dev/null | grep -v "'yatra'" | grep -v '"yatra"' | head -50 || true)
          if [ -n "$TEXT_DOMAIN_ISSUES" ]; then
            ERRORS="${ERRORS}Translation functions possibly missing 'yatra' text domain:\n${TEXT_DOMAIN_ISSUES}\n\n"
          fi
          
          if [ -n "$ERRORS" ]; then
            echo -e "$ERRORS" | tee wp-compat-errors.txt
            exit 1
          fi
          echo "WordPress compatibility checks passed" > wp-compat-errors.txt

      - name: Upload WP Compatibility Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wp-compat-errors
          path: wp-compat-errors.txt
          if-no-files-found: ignore

  # TypeScript/React Code Quality
  typescript-quality:
    name: TypeScript/React Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
          
      - name: Install dependencies
        run: npm ci
        
      - name: TypeScript Type Check
        id: typecheck
        run: |
          echo "Running TypeScript type checking..."
          npm run type-check > typescript-errors.txt 2>&1 || {
            echo "TypeScript type checking failed:"
            cat typescript-errors.txt
            exit 1
          }
          echo "No TypeScript errors found" > typescript-errors.txt
          
      - name: ESLint Check
        id: eslint
        if: always()
        run: |
          echo "Running ESLint..."
          npx eslint resources/js/ --ext .ts,.tsx --format=compact > eslint-errors.txt 2>&1 || {
            echo "ESLint check failed:"
            cat eslint-errors.txt
            exit 1
          }
          echo "No ESLint errors found" > eslint-errors.txt
          
      - name: Prettier Check
        id: prettier
        if: always()
        run: |
          echo "Running Prettier format check..."
          npx prettier --check "resources/js/**/*.{ts,tsx,js,jsx}" > prettier-errors.txt 2>&1 || {
            echo "Prettier format check failed:"
            cat prettier-errors.txt
            exit 1
          }
          echo "No Prettier errors found" > prettier-errors.txt
          
      - name: Check for console.log statements
        id: consolelog
        if: always()
        run: |
          FOUND=$(grep -rn "console\.log" resources/js/ --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" 2>/dev/null | grep -v "//.*console\.log" || true)
          if [ -n "$FOUND" ]; then
            echo "console.log statements found in production code:" > consolelog-errors.txt
            echo "$FOUND" >> consolelog-errors.txt
            cat consolelog-errors.txt
            exit 1
          fi
          echo "No console.log statements found" > consolelog-errors.txt

      - name: Upload All TS/React Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-errors
          path: |
            typescript-errors.txt
            eslint-errors.txt
            prettier-errors.txt
            consolelog-errors.txt
          if-no-files-found: ignore

  # Build Summary - Downloads all artifacts and compiles one comprehensive report
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [quality-check, security-scan, structure-check, wordpress-compatibility, typescript-quality]
    if: always()
    
    steps:
      - name: Download all error artifacts
        uses: actions/download-artifact@v4
        with:
          path: error-reports
          
      - name: Compile Comprehensive AI Error Report
        run: |
          echo "## 🚀 Yatra CI Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Job Status Overview
          if [ "${{ needs.quality-check.result }}" == "success" ]; then
            echo "✅ **Code Quality**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Code Quality**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.security-scan.result }}" == "success" ]; then
            echo "✅ **Security Scan**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Security Scan**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.structure-check.result }}" == "success" ]; then
            echo "✅ **Plugin Structure**: Valid" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Plugin Structure**: Invalid" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.wordpress-compatibility.result }}" == "success" ]; then
            echo "✅ **WordPress Compatibility**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **WordPress Compatibility**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.typescript-quality.result }}" == "success" ]; then
            echo "✅ **TypeScript/React Quality**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **TypeScript/React Quality**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # ============================================================
          # COMPREHENSIVE AI-READY ERROR REPORT
          # ============================================================
          echo "## 📋 COMPLETE ERROR REPORT — Copy everything below this line to AI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "I need help fixing the following CI errors in my WordPress plugin called **Yatra** (a travel booking plugin). The plugin uses PHP 8.1+, TypeScript, React, TailwindCSS, and Vite. Please provide specific code fixes for each error below." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # List all downloaded artifacts for debugging
          echo "### Downloaded artifacts:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -R error-reports/ 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No artifacts downloaded" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # --- PHP LINT ERRORS ---
          echo "### 1. PHP Syntax Errors" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          for f in error-reports/quality-errors-php*/php-lint-errors.txt; do
            if [ -f "$f" ]; then
              echo "--- $(basename $(dirname $f)) ---" >> $GITHUB_STEP_SUMMARY
              cat "$f" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # --- PHPCS ERRORS ---
          echo "### 2. PHP_CodeSniffer — WordPress Coding Standards Violations" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          for f in error-reports/quality-errors-php*/phpcs-errors-readable.txt; do
            if [ -f "$f" ]; then
              echo "--- $(basename $(dirname $f)) ---" >> $GITHUB_STEP_SUMMARY
              cat "$f" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # --- PHPSTAN ERRORS ---
          echo "### 3. PHPStan — Static Analysis Errors" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          for f in error-reports/quality-errors-php*/phpstan-errors-readable.txt; do
            if [ -f "$f" ]; then
              echo "--- $(basename $(dirname $f)) ---" >> $GITHUB_STEP_SUMMARY
              cat "$f" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # --- COMPOSER AUDIT ---
          echo "### 4. Composer Security Audit" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          for f in error-reports/quality-errors-php*/composer-audit.txt error-reports/security-errors/security-audit.txt; do
            if [ -f "$f" ]; then
              cat "$f" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              break
            fi
          done
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # --- DISALLOWED FUNCTIONS ---
          echo "### 5. Disallowed Functions" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          for f in error-reports/quality-errors-php*/disallowed-functions.txt; do
            if [ -f "$f" ]; then
              cat "$f" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              break
            fi
          done
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # --- SECURITY SECRETS ---
          echo "### 6. Hardcoded Secrets Check" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -f "error-reports/security-errors/secrets-check.txt" ]; then
            cat "error-reports/security-errors/secrets-check.txt" >> $GITHUB_STEP_SUMMARY
          else
            echo "No secrets check report available" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # --- STRUCTURE ERRORS ---
          echo "### 7. Plugin Structure Validation" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -f "error-reports/structure-errors/structure-errors.txt" ]; then
            cat "error-reports/structure-errors/structure-errors.txt" >> $GITHUB_STEP_SUMMARY
          else
            echo "No structure report available" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # --- WP COMPATIBILITY ---
          echo "### 8. WordPress Compatibility Issues" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -f "error-reports/wp-compat-errors/wp-compat-errors.txt" ]; then
            cat "error-reports/wp-compat-errors/wp-compat-errors.txt" >> $GITHUB_STEP_SUMMARY
          else
            echo "No WP compatibility report available" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # --- TYPESCRIPT ERRORS ---
          echo "### 9. TypeScript Compilation Errors" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -f "error-reports/typescript-errors/typescript-errors.txt" ]; then
            cat "error-reports/typescript-errors/typescript-errors.txt" >> $GITHUB_STEP_SUMMARY
          else
            echo "No TypeScript report available" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # --- ESLINT ERRORS ---
          echo "### 10. ESLint Violations" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -f "error-reports/typescript-errors/eslint-errors.txt" ]; then
            cat "error-reports/typescript-errors/eslint-errors.txt" >> $GITHUB_STEP_SUMMARY
          else
            echo "No ESLint report available" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # --- PRETTIER ERRORS ---
          echo "### 11. Prettier Formatting Issues" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -f "error-reports/typescript-errors/prettier-errors.txt" ]; then
            cat "error-reports/typescript-errors/prettier-errors.txt" >> $GITHUB_STEP_SUMMARY
          else
            echo "No Prettier report available" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # --- CONSOLE.LOG ---
          echo "### 12. Console.log Statements in Production Code" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -f "error-reports/typescript-errors/consolelog-errors.txt" ]; then
