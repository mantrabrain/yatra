name: Yatra CI

on:
  push:
    branches: [main, master, development, '3.0.0']
  pull_request:
    branches: [main, master, development, '3.0.0']

# Cancel superseded runs on the same ref — saves CI minutes on rapid pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token: jobs only need to read the checkout and write step
# summaries / upload artifacts; nothing here writes to the repo or releases.
permissions:
  contents: read

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # PHP — lint + PHPCS + composer audit across the supported matrix.
  # Single job per PHP version keeps the artifact list flat and lets each
  # matrix slot be skipped/retried independently.
  # ───────────────────────────────────────────────────────────────────────────
  php:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Validate composer.json (before install — fail fast on bad config)
        run: |
          if [ -f composer.json ]; then
            php -r 'json_decode(file_get_contents("composer.json")); exit(json_last_error() === JSON_ERROR_NONE ? 0 : 1);'
          fi

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, mbstring, xml, ctype, iconv, pdo, pdo_mysql, gd, zip, curl, json
          coverage: none
          tools: composer:v2

      - name: Composer validate --strict
        run: composer validate --strict

      - name: Composer cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-
            ${{ runner.os }}-composer-

      - name: Composer install
        run: composer install --prefer-dist --no-progress --no-interaction

      # PHP syntax check across the whole codebase. The previous implementation
      # piped `find` into `while` — the counter incremented in a subshell and
      # was lost in the parent, so every lint failure was silently swallowed.
      # This version captures `php -l` output and uses xargs exit code (each
      # parallel job's failure aggregates into the final status).
      - name: PHP lint
        id: lint
        run: |
          set -o pipefail
          : > php-lint-errors.txt
          find . -type f -name '*.php' \
            -not -path './vendor/*' \
            -not -path './node_modules/*' \
            -not -path './assets/dist/*' \
            -print0 \
          | xargs -0 -n 32 -P 4 php -l 2>&1 \
          | grep -v '^No syntax errors detected' \
          | tee php-lint-errors.txt \
          || true

          if [ -s php-lint-errors.txt ]; then
            echo "::error::PHP syntax errors detected — see artifact 'php-${{ matrix.php }}'"
            exit 1
          fi
          echo "All PHP files syntactically valid." > php-lint-errors.txt

      - name: PHPCS — WordPress coding standards
        id: phpcs
        if: always() && steps.lint.outcome == 'success'
        run: |
          if [ ! -x vendor/bin/phpcs ]; then
            echo "PHPCS not installed via Composer — skipping."
            exit 0
          fi
          vendor/bin/phpcs \
            -d memory_limit=512M \
            --standard=phpcs.xml \
            --report=full \
            --report-file=phpcs-report.txt \
            --report-json=phpcs-report.json \
            -q || true

          if [ -f .github/scripts/parse-phpcs-report.sh ]; then
            bash .github/scripts/parse-phpcs-report.sh || true
          fi

      - name: Composer security audit
        if: always()
        run: composer audit --no-dev 2>&1 | tee composer-audit.txt || true

      # Block the obvious dangerous PHP sinks. Word-boundary regex so `curl_exec`
      # / `collect_system()` don't false-positive against `exec(` / `system(`.
      # Comment lines are filtered so prose mentioning these names is fine.
      - name: Forbidden functions check
        if: always()
        run: |
          : > disallowed-functions.txt
          FOUND=0
          for pat in '(?<![A-Za-z0-9_])eval\s*\(' \
                     '(?<![A-Za-z0-9_])exec\s*\(' \
                     '(?<![A-Za-z0-9_])shell_exec\s*\(' \
                     '(?<![A-Za-z0-9_])system\s*\(' \
                     '(?<![A-Za-z0-9_])passthru\s*\('; do
            grep -rPn "$pat" . \
              --include='*.php' \
              --exclude-dir=vendor \
              --exclude-dir=node_modules \
              --exclude-dir=assets 2>/dev/null \
              | grep -vE ':[[:space:]]*(//|#|\*)' \
              | tee -a disallowed-functions.txt \
              && FOUND=1 || true
          done
          if [ "$FOUND" = "1" ] && [ -s disallowed-functions.txt ]; then
            echo "::error::Forbidden function call detected — see artifact"
            exit 1
          fi
          echo "OK — no disallowed function calls." > disallowed-functions.txt

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ matrix.php }}
          path: |
            php-lint-errors.txt
            phpcs-report.txt
            phpcs-report.json
            phpcs-errors-readable.txt
            composer-audit.txt
            disallowed-functions.txt
          if-no-files-found: ignore
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # Plugin structure / header sanity.
  # ───────────────────────────────────────────────────────────────────────────
  structure:
    name: Plugin Structure
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin layout
        run: |
          ERRORS=0
          [ -f yatra.php ] || { echo "::error::Missing yatra.php"; ERRORS=1; }
          for d in app assets templates includes; do
            [ -d "$d" ] || { echo "::error::Missing required directory: $d"; ERRORS=1; }
          done
          grep -q 'Plugin Name:' yatra.php 2>/dev/null \
            || { echo "::error::Plugin header missing 'Plugin Name:'"; ERRORS=1; }
          grep -q 'Requires PHP:' yatra.php 2>/dev/null \
            || { echo "::error::Plugin header missing 'Requires PHP:'"; ERRORS=1; }
          [ -f composer.json ] \
            || { echo "::error::Missing composer.json"; ERRORS=1; }
          EXEC=$(find . -name '*.php' -not -path './vendor/*' -not -path './node_modules/*' -perm -u+x 2>/dev/null || true)
          if [ -n "$EXEC" ]; then
            echo "::error::Executable PHP files detected (security risk):"
            echo "$EXEC"
            ERRORS=1
          fi
          [ "$ERRORS" -eq 0 ]

  # ───────────────────────────────────────────────────────────────────────────
  # WordPress conventions — wp_-prefixed user functions, text-domain coverage.
  # ───────────────────────────────────────────────────────────────────────────
  wp-compat:
    name: WordPress Compat
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Reserve-prefix + text-domain checks
        run: |
          ERRORS=0

          # User-defined functions can't use the wp_ prefix (reserved by core).
          if grep -rPn '^\s*(public|private|protected|static\s+)*function\s+wp_' . \
               --include='*.php' --exclude-dir=vendor --exclude-dir=node_modules; then
            echo "::error::Functions using reserved wp_ prefix"
            ERRORS=1
          fi

          # Translation calls without the 'yatra' domain (heuristic — first 50).
          MISSING=$(grep -rPn '(?<![A-Za-z0-9_])__\(' . \
            --include='*.php' \
            --exclude-dir=vendor \
            --exclude-dir=node_modules \
            --exclude-dir=assets 2>/dev/null \
            | grep -vE "'yatra'|\"yatra\"" \
            | head -50 || true)
          if [ -n "$MISSING" ]; then
            echo "::warning::__()/_e() calls possibly missing 'yatra' text domain (sample):"
            echo "$MISSING"
          fi

          [ "$ERRORS" -eq 0 ]

  # ───────────────────────────────────────────────────────────────────────────
  # Front-end — TypeScript, ESLint, Prettier, console.log scan.
  # ───────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (TS/React)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # devDependencies are pruned when NODE_ENV=production; tsc / eslint /
    # prettier live in devDependencies, so override here.
    env:
      NODE_ENV: development
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: TypeScript type-check
        id: tsc
        run: npm run type-check 2>&1 | tee typescript-errors.txt

      - name: ESLint
        if: always() && steps.tsc.outcome == 'success'
        run: npm run lint 2>&1 | tee eslint-errors.txt

      - name: Prettier
        if: always()
        run: npm run format:check 2>&1 | tee prettier-errors.txt

      # `console.log` in shipped source clutters customer browsers. Lint config
      # should also catch this; this is a belt-and-braces guard.
      - name: console.log scan
        if: always()
        run: |
          FOUND=$(grep -rn 'console\.log' resources/js \
            --include='*.ts' --include='*.tsx' \
            --include='*.js' --include='*.jsx' 2>/dev/null \
            | grep -vE '^\s*//' || true)
          if [ -n "$FOUND" ]; then
            echo "::error::console.log calls in production source:"
            echo "$FOUND" | tee consolelog-errors.txt
            exit 1
          fi
          echo "OK — no console.log calls." > consolelog-errors.txt

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: |
            typescript-errors.txt
            eslint-errors.txt
            prettier-errors.txt
            consolelog-errors.txt
          if-no-files-found: ignore
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # Aggregated step-summary so failures across the matrix are scannable in one
  # place. No "AI-ready" preamble — that bloats $GITHUB_STEP_SUMMARY (1 MB cap)
  # and adds nothing for a human reviewer.
  # ───────────────────────────────────────────────────────────────────────────
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [php, structure, wp-compat, frontend]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Compose summary
        run: |
          {
            echo "# Yatra CI"
            echo
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| PHP matrix | ${{ needs.php.result }} |"
            echo "| Structure | ${{ needs.structure.result }} |"
            echo "| WP Compat | ${{ needs.wp-compat.result }} |"
            echo "| Frontend | ${{ needs.frontend.result }} |"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          # Inline error reports — kept terse to stay under the summary cap.
          for d in reports/*/; do
            name=$(basename "$d")
            for f in "$d"*.txt; do
              [ -f "$f" ] || continue
              [ -s "$f" ] || continue
              # Skip "OK — …" placeholder files.
              if head -1 "$f" | grep -q '^OK\|^All PHP files syntactically valid\.\|^No '; then
                continue
              fi
              echo "<details><summary><code>${name}/$(basename "$f")</code></summary>" >> "$GITHUB_STEP_SUMMARY"
              echo >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              head -c 32000 "$f" >> "$GITHUB_STEP_SUMMARY"
              echo >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo >> "$GITHUB_STEP_SUMMARY"
              echo "</details>" >> "$GITHUB_STEP_SUMMARY"
              echo >> "$GITHUB_STEP_SUMMARY"
            done
          done
