name: Yatra CI

on:
  push:
    branches: [ main, develop, 3.0.0 ]
  pull_request:
    branches: [ main, develop, 3.0.0 ]

jobs:
  # Code Quality and Standards Compliance
  quality-check:
    name: Code Quality (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [8.1, 8.2]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, gd, zip, curl, json
          coverage: none
          
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-
            ${{ runner.os }}-composer-
            
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --optimize-autoloader
        
      - name: Validate Composer
        run: composer validate --strict
        
      - name: PHP Lint (Syntax Check)
        run: |
          echo "Running PHP syntax check..."
          find . -type f -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" -print0 | xargs -0 -n1 -P4 php -l
          
      - name: Run PHP_CodeSniffer (WordPress Standards)
        run: |
          echo "Running WordPress coding standards check..."
          vendor/bin/phpcs \
            --standard=phpcs.xml \
            --report=full \
            --report=summary \
            --report-file=phpcs-report.txt \
            --report-json=phpcs-report.json \
            --report-gitblame=phpcs-gitblame.txt \
            --verbose
          
          echo "=== PHPCS Summary ==="
          cat phpcs-report.txt | head -50
          
          echo ""
          echo "=== PHPCS Error Details ==="
          if [ -f phpcs-report.json ]; then
            # Extract file errors from JSON report
            php -r '
              $json = json_decode(file_get_contents("phpcs-report.json"), true);
              if (isset($json["files"])) {
                foreach ($json["files"] as $file => $data) {
                  if (isset($data["messages"]) && !empty($data["messages"])) {
                    echo "📁 File: " . $file . "\n";
                    foreach ($data["messages"] as $msg) {
                      echo "  ❌ Line " . $msg["line"] . ": " . $msg["message"] . " (" . $msg["source"] . ")\n";
                    }
                    echo "\n";
                  }
                }
              }
            '
          fi
            
      - name: Upload PHPCS Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: phpcs-reports-php${{ matrix.php }}
          path: |
            phpcs-report.txt
            phpcs-report.json
            phpcs-gitblame.txt
          
                
      - name: Run PHPStan Static Analysis
        run: |
          echo "Running PHPStan static analysis..."
          vendor/bin/phpstan analyse \
            --no-progress \
            --error-format=table \
            --error-format=json=phpstan-report.json \
            --memory-limit=1G
          
          echo ""
          echo "=== PHPStan Error Details ==="
          if [ -f phpstan-report.json ]; then
            php -r '
              $json = json_decode(file_get_contents("phpstan-report.json"), true);
              if (isset($json["files"])) {
                foreach ($json["files"] as $file => $data) {
                  if (isset($data["messages"]) && !empty($data["messages"])) {
                    echo "📁 File: " . $file . "\n";
                    foreach ($data["messages"] as $msg) {
                      echo "  ❌ Line " . $msg["line"] . ": " . $msg["message"] . "\n";
                    }
                    echo "\n";
                  }
                }
              }
              if (isset($json["totals"]) && $json["totals"]["errors"] > 0) {
                echo "🚨 Total PHPStan Errors: " . $json["totals"]["errors"] . "\n";
              }
            '
          fi
          
      - name: Upload PHPStan Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: phpstan-reports-php${{ matrix.php }}
          path: |
            phpstan-report.json
            phpstan-report.txt
                
      - name: Composer Audit (Security Check)
        run: composer audit
        
      - name: Check for disallowed functions
        run: |
          echo "Checking for disallowed functions..."
          disallowed_functions=(
            "eval("
            "exec("
            "shell_exec("
            "system("
            "passthru("
            "file_get_contents("
            "fopen("
            "fwrite("
            "curl_exec("
          )
          
          for func in "${disallowed_functions[@]}"; do
            if grep -r "$func" . --include="*.php" --exclude-dir=vendor --exclude-dir=node_modules; then
              echo "❌ Disallowed function $func found!"
              exit 1
            fi
          done
          echo "✅ No disallowed functions found"

  # Security Scanning
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: quality-check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: dom, mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, gd, zip, curl
          
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-security-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-security-
            
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress
        
      - name: Run Composer Security Audit
        run: composer audit
        
      - name: Check for hardcoded secrets
        run: |
          echo "Checking for potential secrets..."
          # Check for common secret patterns
          if grep -r -i "password\|secret\|key\|token\|api" . --include="*.php" --include="*.js" --include="*.json" --exclude-dir=vendor --exclude-dir=node_modules | grep -v "// password\|# password\|// secret\|# secret\|// key\|# key"; then
            echo "⚠️  Potential secrets found. Please review the output above."
            exit 1
          fi
          echo "✅ No obvious secrets found"

  # Plugin Structure Validation
  structure-check:
    name: Plugin Structure Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Check plugin structure
        run: |
          echo "Checking Yatra plugin structure..."
          
          # Check main plugin file
          if [ ! -f "yatra.php" ]; then
            echo "❌ Main plugin file yatra.php not found"
            exit 1
          fi
          
          # Check required directories
          required_dirs=("app" "assets" "templates" "includes")
          for dir in "${required_dirs[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "❌ Required directory $dir not found"
              exit 1
            fi
          done
          
          # Check plugin header
          if ! grep -q "Plugin Name:" yatra.php; then
            echo "❌ Plugin header not found in yatra.php"
            exit 1
          fi
          
          # Check for composer.json
          if [ ! -f "composer.json" ]; then
            echo "❌ composer.json not found"
            exit 1
          fi
          
          echo "✅ Plugin structure is valid"
          
      - name: Check file permissions
        run: |
          echo "Checking file permissions..."
          
          # Check for executable permissions on PHP files
          executable_files=$(find . -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" -executable 2>/dev/null || true)
          
          if [ -n "$executable_files" ]; then
            echo "❌ Executable permissions found on PHP files:"
            echo "$executable_files"
            echo "PHP files should not have executable permissions for security."
            exit 1
          fi
          
          echo "✅ File permissions are correct"

  # WordPress Compatibility Check
  wordpress-compatibility:
    name: WordPress Compatibility
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: dom, mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, gd, zip, curl
          
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-wp-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-wp-
            
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress
        
      - name: Check WordPress functions usage
        run: |
          echo "Checking WordPress function usage..."
          
          # Check for custom function definitions with wp_ prefix (not function_exists calls)
          if grep -r "^function wp_\|^    function wp_\|^public function wp_\|^private function wp_\|^static function wp_" . --include="*.php" --exclude-dir=vendor --exclude-dir=node_modules; then
            echo "❌ Custom functions with wp_ prefix found (should be unique)"
            echo "WordPress core functions should not be redefined. Use unique prefix for custom functions."
            exit 1
          fi
          
          # Check for proper text domain usage
          if grep -r "__(" . --include="*.php" --exclude-dir=vendor --exclude-dir=node_modules | grep -v "'yatra'" | grep -v '"yatra"'; then
            echo "❌ Translation functions without 'yatra' text domain found"
            exit 1
          fi
          
          echo "✅ WordPress compatibility checks passed"

  # TypeScript/React Code Quality
  typescript-quality:
    name: TypeScript/React Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
          
      - name: Install dependencies
        run: npm ci
        
      - name: TypeScript Type Check
        run: |
          echo "Running TypeScript type checking..."
          npm run type-check || {
            echo "❌ TypeScript type checking failed"
            exit 1
          }
          
      - name: ESLint Check
        run: |
          echo "Running ESLint..."
          npx eslint resources/js/ --ext .ts,.tsx --format=compact || {
            echo "❌ ESLint check failed"
            exit 1
          }
          
      - name: Prettier Check
        run: |
          echo "Running Prettier format check..."
          npx prettier --check "resources/js/**/*.{ts,tsx,js,jsx}" || {
            echo "❌ Prettier format check failed"
            echo "Run 'npm run format' to fix formatting issues"
            exit 1
          }
          
      - name: Check for console.log statements
        run: |
          echo "Checking for console.log statements in production code..."
          if grep -r "console\.log" resources/js/ --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" | grep -v "//.*console\.log"; then
            echo "❌ Found console.log statements in production code"
            echo "Please remove console.log statements before committing"
            exit 1
          fi
          echo "✅ No console.log statements found"
          
      - name: Check for hardcoded secrets in JS/TS
        run: |
          echo "Checking for hardcoded secrets in JavaScript/TypeScript..."
          secret_patterns=(
            "password\s*=\s*['\"][^'\"]+['\"]"
            "api_key\s*=\s*['\"][^'\"]+['\"]"
            "secret\s*=\s*['\"][^'\"]+['\"]"
            "token\s*=\s*['\"][^'\"]+['\"]"
          )
          
          for pattern in "${secret_patterns[@]}"; do
            if grep -r "$pattern" resources/js/ --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx"; then
              echo "❌ Potential hardcoded secret found in JavaScript/TypeScript"
              exit 1
            fi
          done
          echo "✅ No hardcoded secrets found in JavaScript/TypeScript"
          
      - name: Check React best practices
        run: |
          echo "Checking React best practices..."
          
          # Check for missing React keys in lists
          if grep -r "map(" resources/js/ --include="*.tsx" --include="*.jsx" | grep -v "key="; then
            echo "⚠️  Possible missing React key in map function"
          fi
          
          # Check for any() usage in React components
          if grep -r "any" resources/js/ --include="*.tsx" --include="*.jsx" | grep -v "//.*any"; then
            echo "⚠️  Found 'any' type usage in React components"
          fi
          
          echo "✅ React best practices check completed"

  # Build Summary
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [quality-check, security-scan, structure-check, wordpress-compatibility, typescript-quality]
    if: always()
    
    steps:
      - name: Build Summary
        run: |
          echo "## 🚀 Yatra CI Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Quality Check Status
          if [ "${{ needs.quality-check.result }}" == "success" ]; then
            echo "✅ **Code Quality**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Code Quality**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Security Scan Status
          if [ "${{ needs.security-scan.result }}" == "success" ]; then
            echo "✅ **Security Scan**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Security Scan**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Structure Check Status
          if [ "${{ needs.structure-check.result }}" == "success" ]; then
            echo "✅ **Plugin Structure**: Valid" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Plugin Structure**: Invalid" >> $GITHUB_STEP_SUMMARY
          fi
          
          # WordPress Compatibility Status
          if [ "${{ needs.wordpress-compatibility.result }}" == "success" ]; then
            echo "✅ **WordPress Compatibility**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **WordPress Compatibility**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          # TypeScript/React Quality Status
          if [ "${{ needs.typescript-quality.result }}" == "success" ]; then
            echo "✅ **TypeScript/React Quality**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **TypeScript/React Quality**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Test Matrix" >> $GITHUB_STEP_SUMMARY
          echo "| PHP Version | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 8.1 | ${{ contains(needs.quality-check.result, 'success') && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 8.2 | ${{ contains(needs.quality-check.result, 'success') && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          
          # Detailed Error Reports Section
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 Detailed Error Reports (Copy & Paste to AI)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # PHPCS Errors
          echo "### 🔍 PHP_CodeSniffer (WordPress Coding Standards)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -f "phpcs-report.txt" ]; then
            cat phpcs-report.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "No PHPCS report available" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # PHPStan Errors
          echo "### 🧠 PHPStan (Static Analysis)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -f "phpstan-report.json" ]; then
            php -r '
              $json = json_decode(file_get_contents("phpstan-report.json"), true);
              if (isset($json["files"])) {
                foreach ($json["files"] as $file => $data) {
                  if (isset($data["messages"]) && !empty($data["messages"])) {
                    echo "FILE: " . $file . "\n";
                    foreach ($data["messages"] as $msg) {
                      echo "  Line " . $msg["line"] . ": " . $msg["message"] . "\n";
                    }
                    echo "\n";
                  }
                }
              }
              if (isset($json["totals"]) && $json["totals"]["errors"] > 0) {
                echo "TOTAL ERRORS: " . $json["totals"]["errors"] . "\n";
              }
            ' >> $GITHUB_STEP_SUMMARY
          else
            echo "No PHPStan report available" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # TypeScript/React Errors
          echo "### ⚛️ TypeScript/React Errors" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "TypeScript errors:" >> $GITHUB_STEP_SUMMARY
          if command -v npm &> /dev/null && [ -f "package.json" ]; then
            npm run type-check 2>&1 | head -20 >> $GITHUB_STEP_SUMMARY || echo "TypeScript check completed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "ESLint errors:" >> $GITHUB_STEP_SUMMARY
            npx eslint resources/js/ --ext .ts,.tsx --format=compact 2>&1 | head -20 >> $GITHUB_STEP_SUMMARY || echo "ESLint check completed" >> $GITHUB_STEP_SUMMARY
          else
            echo "No Node.js environment available for detailed TS/React errors" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Security Issues
          echo "### 🔒 Security Issues" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Composer audit results:" >> $GITHUB_STEP_SUMMARY
          if command -v composer &> /dev/null; then
            composer audit 2>&1 | head -10 >> $GITHUB_STEP_SUMMARY || echo "Composer audit completed" >> $GITHUB_STEP_SUMMARY
          else
            echo "No Composer environment available" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # File Structure Issues
          echo "### 📁 File Structure Issues" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "WordPress compatibility issues:" >> $GITHUB_STEP_SUMMARY
          echo "Checking for translation function text domain issues..." >> $GITHUB_STEP_SUMMARY
          if grep -r "__(" . --include="*.php" --exclude-dir=vendor --exclude-dir=node_modules | grep -v "'yatra'" | grep -v '"yatra"' | head -10; then
            echo "Found translation functions without 'yatra' text domain" >> $GITHUB_STEP_SUMMARY
          else
            echo "No text domain issues found" >> $GITHUB_STEP_SUMMARY
          fi >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Text domain check completed" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          # Artifact Download Links
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📦 Download Full Reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the complete error reports from the Actions tab:" >> $GITHUB_STEP_SUMMARY
          echo "- **PHPCS Reports**: \`phpcs-reports-php8.1\` and \`phpcs-reports-php8.2\`" >> $GITHUB_STEP_SUMMARY
          echo "- **PHPStan Reports**: \`phpstan-reports-php8.1\` and \`phpstan-reports-php8.2\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "These artifacts contain:" >> $GITHUB_STEP_SUMMARY
          echo "- \`phpcs-report.txt\` - Full PHPCS output" >> $GITHUB_STEP_SUMMARY
          echo "- \`phpcs-report.json\` - Structured PHPCS data" >> $GITHUB_STEP_SUMMARY
          echo "- \`phpcs-gitblame.txt\` - Git blame information" >> $GITHUB_STEP_SUMMARY
          echo "- \`phpstan-report.json\` - Complete PHPStan analysis" >> $GITHUB_STEP_SUMMARY
