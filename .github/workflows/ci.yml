name: Yatra CI

on:
  push:
    branches: [ main, develop, 3.0.0 ]
  pull_request:
    branches: [ main, develop, 3.0.0 ]

jobs:
  # Code Quality and Standards Compliance
  quality-check:
    name: Code Quality (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3', '8.4']
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, mbstring, xml, ctype, iconv, pdo, pdo_mysql, gd, zip, curl, json
          coverage: none
          
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-
            ${{ runner.os }}-composer-
            
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --optimize-autoloader
        
      - name: Configure PHPCS
        run: vendor/bin/phpcs --config-set installed_paths vendor/wp-coding-standards/wpcs
        
      - name: Validate Composer
        run: composer validate --strict
        
      - name: PHP Lint (Syntax Check)
        id: php-lint
        run: |
          echo "Running PHP syntax check..."
          ERRORS=""
          while IFS= read -r -d '' file; do
            OUTPUT=$(php -l "$file" 2>&1)
            if [ $? -ne 0 ]; then
              ERRORS="${ERRORS}${OUTPUT}\n"
            fi
          done < <(find . -type f -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" -print0)
          
          if [ -n "$ERRORS" ]; then
            echo -e "$ERRORS" > php-lint-errors.txt
            echo -e "$ERRORS"
            echo "has_errors=true" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "No PHP syntax errors found" > php-lint-errors.txt
          echo "has_errors=false" >> $GITHUB_OUTPUT
          
      - name: Run PHP_CodeSniffer (WordPress Standards)
        id: phpcs
        if: always() && steps.php-lint.outcome != 'failure'
        run: |
          echo "Running WordPress coding standards check..."
          vendor/bin/phpcs \
            -d memory_limit=512M \
            --standard=phpcs.xml \
            --report=full \
            --report-file=phpcs-report.txt \
            --report-json=phpcs-report.json \
            --report-gitblame=phpcs-gitblame.txt \
            -q || true
          
          # Parse PHPCS report using bash script
          bash .github/scripts/parse-phpcs-report.sh
                
      - name: Run PHPStan Static Analysis
        id: phpstan
        if: always() && steps.php-lint.outcome != 'failure'
        run: |
          echo "Running PHPStan static analysis..."
          vendor/bin/phpstan analyse \
            --no-progress \
            --error-format=json \
            --memory-limit=2G > phpstan-report.json 2>&1 || true
          
          # Parse PHPStan report using bash script
          bash .github/scripts/parse-phpstan-report.sh
          
      - name: Composer Audit (Security Check)
        id: composer-audit
        if: always()
        run: |
          composer audit 2>&1 | tee composer-audit.txt || true
          
      - name: Check for disallowed functions
        id: disallowed
        if: always()
        run: |
          echo "Checking for disallowed functions..."
          FOUND=""
          disallowed_functions=("eval(" "exec(" "shell_exec(" "system(" "passthru(")
          
          for func in "${disallowed_functions[@]}"; do
            MATCHES=$(grep -rn "$func" . --include="*.php" --exclude-dir=vendor --exclude-dir=node_modules 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              FOUND="${FOUND}Disallowed function '${func}' found:\n${MATCHES}\n\n"
            fi
          done
          
          if [ -n "$FOUND" ]; then
            echo -e "$FOUND" | tee disallowed-functions.txt
            exit 1
          fi
          echo "No disallowed functions found" > disallowed-functions.txt

      - name: Upload All Error Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-errors-php${{ matrix.php }}
          path: |
            php-lint-errors.txt
            phpcs-report.txt
            phpcs-report.json
            phpcs-gitblame.txt
            phpcs-errors-readable.txt
            phpstan-report.json
            phpstan-errors-readable.txt
            composer-audit.txt
            disallowed-functions.txt
          if-no-files-found: ignore

  # Security Scanning
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: dom, mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, gd, zip, curl
          
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-security-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-security-
            
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress
        
      - name: Run Composer Security Audit
        id: security-audit
        run: composer audit 2>&1 | tee security-audit.txt || true
        
      - name: Check for hardcoded secrets
        id: secrets-check
        run: |
          echo "Checking for potential secrets..." > secrets-check.txt
          FOUND=$(grep -rn -i "password\s*=\s*['\"][^'\"]\+['\"]" . --include="*.php" --exclude-dir=vendor --exclude-dir=node_modules 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "Potential hardcoded passwords found:" >> secrets-check.txt
            echo "$FOUND" >> secrets-check.txt
            cat secrets-check.txt
            exit 1
          fi
          echo "No obvious secrets found" >> secrets-check.txt

      - name: Upload Security Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-errors
          path: |
            security-audit.txt
            secrets-check.txt
          if-no-files-found: ignore

  # Plugin Structure Validation
  structure-check:
    name: Plugin Structure Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Check plugin structure
        run: |
          ERRORS="" 
          
          if [ ! -f "yatra.php" ]; then
            ERRORS="${ERRORS}Main plugin file yatra.php not found\n"
          fi
          
          required_dirs=("app" "assets" "templates" "includes")
          for dir in "${required_dirs[@]}"; do
            if [ ! -d "$dir" ]; then
              ERRORS="${ERRORS}Required directory $dir not found\n"
            fi
          done
          
          if ! grep -q "Plugin Name:" yatra.php 2>/dev/null; then
            ERRORS="${ERRORS}Plugin header not found in yatra.php\n"
          fi
          
          if [ ! -f "composer.json" ]; then
            ERRORS="${ERRORS}composer.json not found\n"
          fi
          
          executable_files=$(find . -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" -executable 2>/dev/null || true)
          if [ -n "$executable_files" ]; then
            ERRORS="${ERRORS}Executable PHP files found (security risk):\n${executable_files}\n"
          fi
          
          if [ -n "$ERRORS" ]; then
            echo -e "$ERRORS" | tee structure-errors.txt
            exit 1
          fi
          echo "Plugin structure is valid" > structure-errors.txt
          
      - name: Upload Structure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: structure-errors
          path: structure-errors.txt
          if-no-files-found: ignore

  # PHP Compatibility Matrix Testing
  php-compatibility:
    name: PHP ${{ matrix.php }} Compatibility
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3', '8.4']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, mbstring, xml, ctype, iconv, pdo, pdo_mysql, gd, zip, curl, json
          
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-php${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-php${{ matrix.php }}-
            
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --ignore-platform-reqs
        
      - name: Configure PHPCS
        run: vendor/bin/phpcs --config-set installed_paths vendor/wp-coding-standards/wpcs || true
        
      - name: PHP Syntax Check (Lint)
        run: |
          echo "Checking PHP syntax for PHP ${{ matrix.php }}..." >&2
          
          # Debug: Check PHP version
          echo "PHP version:" >&2
          php -v >&2
          
          # Debug: Check if PHP files exist
          echo "PHP files found:" >&2
          find app includes templates -name "*.php" | wc -l >&2
          
          # Initialize error counter
          SYNTAX_ERRORS=0
          
          # Get list of PHP files and check each one
          find app includes templates -name "*.php" > php_files_list.txt || {
            echo "❌ No PHP files found to check" | tee -a php${{ matrix.php }}-compat.txt
            exit 1
          }
          
          echo "Starting syntax check..." >&2
          
          while read -r file; do
            if [ -f "$file" ]; then
              echo "Checking: $file" >&2
              OUTPUT=$(php -l "$file" 2>&1)
              PHP_EXIT_CODE=$?
              
              echo "$OUTPUT" >> php${{ matrix.php }}-lint.txt
              
              if [ $PHP_EXIT_CODE -ne 0 ]; then
                echo "❌ Syntax error in $file:" | tee -a php${{ matrix.php }}-compat.txt
                echo "$OUTPUT" | tee -a php${{ matrix.php }}-compat.txt
                SYNTAX_ERRORS=$((SYNTAX_ERRORS + 1))
              fi
            fi
          done < php_files_list.txt
          
          # Clean up
          rm -f php_files_list.txt
          
          echo "Syntax check completed. Errors found: $SYNTAX_ERRORS" >&2
          
          if [ $SYNTAX_ERRORS -gt 0 ]; then
            echo "❌ PHP ${{ matrix.php }}: Found $SYNTAX_ERRORS files with syntax errors" | tee -a php${{ matrix.php }}-compat.txt
            exit 1
          else
            echo "✅ PHP ${{ matrix.php }} syntax check passed - All files valid" | tee -a php${{ matrix.php }}-compat.txt
          fi
          
      - name: Check Deprecated Functions (PHP ${{ matrix.php }})
        run: |
          echo "Checking for deprecated functions in PHP ${{ matrix.php }}..." >&2
          echo "Checking for deprecated functions in PHP ${{ matrix.php }}..." | tee -a php${{ matrix.php }}-compat.txt
          
          # PHP 7.4 deprecations
          if [ "${{ matrix.php }}" = "7.4" ] || [ "${{ matrix.php }}" = "8.0" ] || [ "${{ matrix.php }}" = "8.1" ] || [ "${{ matrix.php }}" = "8.2" ] || [ "${{ matrix.php }}" = "8.3" ] || [ "${{ matrix.php }}" = "8.4" ]; then
            DEPRECATED=$(grep -rn "create_function\|each\|money_format\|ezmlm_hash" app includes templates --include="*.php" 2>/dev/null || true)
            if [ -n "$DEPRECATED" ]; then
              echo "⚠️ PHP 7.4+ deprecated functions found:" | tee -a php${{ matrix.php }}-compat.txt
              echo "$DEPRECATED" | tee -a php${{ matrix.php }}-compat.txt
            fi
          fi
          
          # PHP 8.0+ deprecations
          if [ "${{ matrix.php }}" = "8.0" ] || [ "${{ matrix.php }}" = "8.1" ] || [ "${{ matrix.php }}" = "8.2" ] || [ "${{ matrix.php }}" = "8.3" ] || [ "${{ matrix.php }}" = "8.4" ]; then
            DEPRECATED_80=$(grep -rn "get_magic_quotes_gpc\|get_magic_quotes_runtime" app includes templates --include="*.php" 2>/dev/null || true)
            if [ -n "$DEPRECATED_80" ]; then
              echo "⚠️ PHP 8.0+ deprecated functions found:" | tee -a php${{ matrix.php }}-compat.txt
              echo "$DEPRECATED_80" | tee -a php${{ matrix.php }}-compat.txt
            fi
          fi
          
          # PHP 8.1+ deprecations
          if [ "${{ matrix.php }}" = "8.1" ] || [ "${{ matrix.php }}" = "8.2" ] || [ "${{ matrix.php }}" = "8.3" ] || [ "${{ matrix.php }}" = "8.4" ]; then
            DEPRECATED_81=$(grep -rn "utf8_encode\|utf8_decode" app includes templates --include="*.php" 2>/dev/null || true)
            if [ -n "$DEPRECATED_81" ]; then
              echo "⚠️ PHP 8.1+ deprecated functions found:" | tee -a php${{ matrix.php }}-compat.txt
              echo "$DEPRECATED_81" | tee -a php${{ matrix.php }}-compat.txt
            fi
          fi
          
          echo "Deprecated function check completed" | tee -a php${{ matrix.php }}-compat.txt
          
      - name: PHPCS Coding Standards (PHP ${{ matrix.php }})
        run: |
          echo "Running PHPCS coding standards for PHP ${{ matrix.php }}..." >&2
          if [ -f "vendor/bin/phpcs" ]; then
            vendor/bin/phpcs \
              -d memory_limit=512M \
              --standard=phpcs.xml \
              --report=full \
              --report-json=phpcs-report.json \
              -q > phpcs-output.txt 2>&1 || true
            
            # Parse PHPCS report using bash script
            if [ -f "phpcs-report.json" ]; then
              bash .github/scripts/parse-phpcs-report.sh || true
              echo "PHPCS analysis completed for PHP ${{ matrix.php }}" | tee -a php${{ matrix.php }}-compat.txt
            else
              echo "PHPCS not available for PHP ${{ matrix.php }}" | tee -a php${{ matrix.php }}-compat.txt
            fi
          else
            echo "PHPCS binary not found for PHP ${{ matrix.php }}" | tee -a php${{ matrix.php }}-compat.txt
          fi
          
      - name: PHPStan Static Analysis (PHP ${{ matrix.php }})
        run: |
          echo "Running PHPStan static analysis for PHP ${{ matrix.php }}..."
          if [ -f "vendor/bin/phpstan" ]; then
            vendor/bin/phpstan analyse \
              --no-progress \
              --error-format=json \
              --memory-limit=2G > phpstan-report.json 2>&1 || true
            
            # Parse PHPStan report using bash script
            if [ -f "phpstan-report.json" ]; then
              bash .github/scripts/parse-phpstan-report.sh || true
              echo "PHPStan analysis completed for PHP ${{ matrix.php }}" | tee -a php${{ matrix.php }}-compat.txt
            else
              echo "PHPStan not available for PHP ${{ matrix.php }}" | tee -a php${{ matrix.php }}-compat.txt
            fi
          else
            echo "PHPStan binary not found for PHP ${{ matrix.php }}" | tee -a php${{ matrix.php }}-compat.txt
          fi
          
      - name: Upload PHP ${{ matrix.php }} Compatibility Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: php${{ matrix.php }}-compatibility
          path: |
            php${{ matrix.php }}-compat.txt
            php${{ matrix.php }}-lint.txt
            phpcs-errors-readable.txt
            phpcs-report.json
            phpcs-output.txt
            phpstan-errors-readable.txt
            phpstan-report.json
          if-no-files-found: ignore

  # WordPress Compatibility Check
  wordpress-compatibility:
    name: WordPress Compatibility
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: dom, mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, gd, zip, curl
          
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-wp-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-wp-
            
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress
        
      - name: Check WordPress compatibility
        run: |
          ERRORS=""
          
          # Check for custom function definitions with wp_ prefix
          WP_FUNCS=$(grep -rn "^[[:space:]]*\(public \|private \|protected \|static \)*function wp_" . --include="*.php" --exclude-dir=vendor --exclude-dir=node_modules 2>/dev/null || true)
          if [ -n "$WP_FUNCS" ]; then
            ERRORS="${ERRORS}Custom functions with wp_ prefix found (should use unique prefix):\n${WP_FUNCS}\n\n"
          fi
          
          # Check for proper text domain usage
          TEXT_DOMAIN_ISSUES=$(grep -rn "__(" . --include="*.php" --exclude-dir=vendor --exclude-dir=node_modules 2>/dev/null | grep -v "'yatra'" | grep -v '"yatra"' | head -50 || true)
          if [ -n "$TEXT_DOMAIN_ISSUES" ]; then
            ERRORS="${ERRORS}Translation functions possibly missing 'yatra' text domain:\n${TEXT_DOMAIN_ISSUES}\n\n"
          fi
          
          if [ -n "$ERRORS" ]; then
            echo -e "$ERRORS" | tee wp-compat-errors.txt
            exit 1
          fi
          echo "WordPress compatibility checks passed" > wp-compat-errors.txt

      - name: Upload WP Compatibility Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wp-compat-errors
          path: wp-compat-errors.txt
          if-no-files-found: ignore

  # TypeScript/React Code Quality
  typescript-quality:
    name: TypeScript/React Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
          
      - name: Install dependencies
        run: npm ci
        
      - name: TypeScript Type Check
        id: typecheck
        run: |
          echo "Running TypeScript type checking..."
          npm run type-check > typescript-errors.txt 2>&1 || {
            echo "TypeScript type checking failed:"
            cat typescript-errors.txt
            exit 1
          }
          echo "No TypeScript errors found" > typescript-errors.txt
          
      - name: ESLint Check
        id: eslint
        if: always()
        run: |
          echo "Running ESLint..."
          npx eslint resources/js/ --ext .ts,.tsx --format=compact > eslint-errors.txt 2>&1 || {
            echo "ESLint check failed:"
            cat eslint-errors.txt
            exit 1
          }
          echo "No ESLint errors found" > eslint-errors.txt
          
      - name: Prettier Check
        id: prettier
        if: always()
        run: |
          echo "Running Prettier format check..."
          npx prettier --check "resources/js/**/*.{ts,tsx,js,jsx}" > prettier-errors.txt 2>&1 || {
            echo "Prettier format check failed:"
            cat prettier-errors.txt
            exit 1
          }
          echo "No Prettier errors found" > prettier-errors.txt
          
      - name: Check for console.log statements
        id: consolelog
        if: always()
        run: |
          FOUND=$(grep -rn "console\.log" resources/js/ --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" 2>/dev/null | grep -v "//.*console\.log" || true)
          if [ -n "$FOUND" ]; then
            echo "console.log statements found in production code:" > consolelog-errors.txt
            echo "$FOUND" >> consolelog-errors.txt
            cat consolelog-errors.txt
            exit 1
          fi
          echo "No console.log statements found" > consolelog-errors.txt

      - name: Upload All TS/React Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-errors
          path: |
            typescript-errors.txt
            eslint-errors.txt
            prettier-errors.txt
            consolelog-errors.txt
          if-no-files-found: ignore

  # Build Summary - Downloads all artifacts and compiles one comprehensive report
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [quality-check, security-scan, structure-check, php-compatibility, wordpress-compatibility, typescript-quality]
    if: always()
    
    steps:
      - name: Download all error artifacts
        uses: actions/download-artifact@v4
        with:
          path: error-reports
          
      - name: Compile Comprehensive AI Error Report
        run: |
          echo "## 🚀 Yatra CI Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Job Status Overview
          if [ "${{ needs.quality-check.result }}" == "success" ]; then
            echo "✅ **Code Quality**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Code Quality**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.security-scan.result }}" == "success" ]; then
            echo "✅ **Security Scan**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Security Scan**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.structure-check.result }}" == "success" ]; then
            echo "✅ **Plugin Structure**: Valid" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Plugin Structure**: Invalid" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.wordpress-compatibility.result }}" == "success" ]; then
            echo "✅ **WordPress Compatibility**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **WordPress Compatibility**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.typescript-quality.result }}" == "success" ]; then
            echo "✅ **TypeScript/React Quality**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **TypeScript/React Quality**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # ============================================================
          # COMPREHENSIVE AI-READY ERROR REPORT
          # ============================================================
          echo "## 📋 COMPLETE ERROR REPORT — Copy everything below this line to AI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "I need help fixing the following CI errors in my WordPress plugin called **Yatra** (a travel booking plugin). The plugin uses PHP 8.1+, TypeScript, React, TailwindCSS, and Vite. Please provide specific code fixes for each error below." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # List all downloaded artifacts for debugging
          echo "### Downloaded artifacts:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -R error-reports/ 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No artifacts downloaded" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # --- PHP LINT ERRORS ---
          HAS_PHP_LINT_ERRORS=false
          for f in error-reports/quality-errors-php*/php-lint-errors.txt; do
            if [ -f "$f" ] && [ -s "$f" ]; then
              if [ "$HAS_PHP_LINT_ERRORS" = "false" ]; then
                echo "### 1. PHP Syntax Errors" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                HAS_PHP_LINT_ERRORS=true
              fi
              echo "--- $(basename $(dirname $f)) ---" >> $GITHUB_STEP_SUMMARY
              cat "$f" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done
          if [ "$HAS_PHP_LINT_ERRORS" = "true" ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          # --- PHPCS ERRORS ---
          HAS_PHPCS_ERRORS=false
          for f in error-reports/quality-errors-php*/phpcs-errors-readable.txt; do
            if [ -f "$f" ] && [ -s "$f" ]; then
              if [ "$HAS_PHPCS_ERRORS" = "false" ]; then
                echo "### 2. PHP_CodeSniffer — WordPress Coding Standards Violations" >> $GITHUB_STEP_SUMMARY
